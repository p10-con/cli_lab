<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>gris / todo</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0d1117;
      --surface:   #161b22;
      --border:    #30363d;
      --text:      #e6edf3;
      --text-dim:  #8b949e;
      --accent:    #58a6ff;
      --green:     #3fb950;
      --yellow:    #d29922;
      --red:       #f85149;
      --radius:    8px;
      --font:      'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      min-height: 100vh;
      padding: 2rem 1rem;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      max-width: 560px;
      margin-bottom: 1.5rem;
    }

    header h1 {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 0.04em;
    }

    header p {
      font-size: 0.78rem;
      color: var(--text-dim);
      margin-top: 0.25rem;
    }

    .status-bar {
      width: 100%;
      max-width: 560px;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 0.75rem;
      color: var(--text-dim);
      margin-bottom: 1rem;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-dim);
      flex-shrink: 0;
      transition: background 0.3s;
    }
    .status-dot.ok    { background: var(--green); }
    .status-dot.error { background: var(--red); }
    .status-dot.loading {
      background: var(--yellow);
      animation: pulse 1s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.3; }
    }

    .stats {
      width: 100%;
      max-width: 560px;
      display: flex;
      gap: 1rem;
      margin-bottom: 1.25rem;
    }

    .stat {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.6rem 1rem;
      flex: 1;
      text-align: center;
    }

    .stat-value {
      font-size: 1.5rem;
      font-weight: 700;
      line-height: 1;
    }
    .stat-label {
      font-size: 0.7rem;
      color: var(--text-dim);
      margin-top: 0.2rem;
    }
    .stat-value.total   { color: var(--accent); }
    .stat-value.pending { color: var(--yellow); }
    .stat-value.done    { color: var(--green); }

    .list {
      width: 100%;
      max-width: 560px;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    .todo-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 0.75rem 1rem;
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
      transition: border-color 0.2s;
    }
    .todo-item:hover { border-color: var(--accent); }
    .todo-item.is-done {
      opacity: 0.55;
      border-color: var(--border);
    }

    .todo-check {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 2px solid var(--text-dim);
      flex-shrink: 0;
      margin-top: 2px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .is-done .todo-check {
      background: var(--green);
      border-color: var(--green);
    }
    .is-done .todo-check::after {
      content: '';
      display: block;
      width: 6px;
      height: 4px;
      border-left: 2px solid #0d1117;
      border-bottom: 2px solid #0d1117;
      transform: rotate(-45deg) translate(1px, -1px);
    }

    .todo-body { flex: 1; min-width: 0; }

    .todo-text {
      font-size: 0.95rem;
      word-break: break-word;
    }
    .is-done .todo-text {
      text-decoration: line-through;
      color: var(--text-dim);
    }

    .todo-meta {
      font-size: 0.7rem;
      color: var(--text-dim);
      margin-top: 0.2rem;
    }

    .todo-id {
      font-size: 0.7rem;
      color: var(--text-dim);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 0.1rem 0.35rem;
      flex-shrink: 0;
      font-family: monospace;
    }

    .empty {
      width: 100%;
      max-width: 560px;
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-dim);
      font-size: 0.9rem;
    }

    .error-box {
      width: 100%;
      max-width: 560px;
      background: #2d1117;
      border: 1px solid var(--red);
      border-radius: var(--radius);
      padding: 0.75rem 1rem;
      font-size: 0.82rem;
      color: var(--red);
    }

    footer {
      margin-top: 2.5rem;
      font-size: 0.7rem;
      color: var(--text-dim);
      text-align: center;
    }
    footer a { color: var(--accent); text-decoration: none; }
    footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <header>
    <h1>gris / todo</h1>
    <p>GitHub data ブランチで管理する Todo リスト</p>
  </header>

  <div class="status-bar">
    <span class="status-dot" id="statusDot"></span>
    <span id="statusText">読み込み中...</span>
  </div>

  <div class="stats" id="stats" hidden>
    <div class="stat">
      <div class="stat-value total" id="statTotal">0</div>
      <div class="stat-label">合計</div>
    </div>
    <div class="stat">
      <div class="stat-value pending" id="statPending">0</div>
      <div class="stat-label">未完了</div>
    </div>
    <div class="stat">
      <div class="stat-value done" id="statDone">0</div>
      <div class="stat-label">完了</div>
    </div>
  </div>

  <div class="list" id="list"></div>

  <footer>
    データ: <a href="https://github.com/p10-con/cli_lab/blob/data/gris/todos.json" target="_blank" rel="noopener">p10-con/cli_lab @ data</a>
    &nbsp;·&nbsp; 3秒ごとに自動更新
  </footer>

  <script>
    const DATA_URL = 'https://raw.githubusercontent.com/p10-con/cli_lab/data/gris/todos.json';
    const INTERVAL = 3000;

    const dot    = document.getElementById('statusDot');
    const status = document.getElementById('statusText');
    const stats  = document.getElementById('stats');
    const list   = document.getElementById('list');

    function setStatus(state, msg) {
      dot.className = 'status-dot ' + state;
      status.textContent = msg;
    }

    function renderTodos(todos) {
      const total   = todos.length;
      const done    = todos.filter(t => t.done).length;
      const pending = total - done;

      document.getElementById('statTotal').textContent   = total;
      document.getElementById('statPending').textContent = pending;
      document.getElementById('statDone').textContent    = done;
      stats.hidden = total === 0;

      if (total === 0) {
        list.innerHTML = '<div class="empty">Todo はまだありません。<br>CLI で <code>node index.js add "タスク"</code> して追加しよう！</div>';
        return;
      }

      list.innerHTML = todos.map(t => `
        <div class="todo-item${t.done ? ' is-done' : ''}">
          <div class="todo-check"></div>
          <div class="todo-body">
            <div class="todo-text">${escHtml(t.text)}</div>
            <div class="todo-meta">${escHtml(t.created)}</div>
          </div>
          <span class="todo-id">#${t.id}</span>
        </div>
      `).join('');
    }

    function escHtml(s) {
      return String(s)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    async function fetchAndRender() {
      setStatus('loading', '更新中...');
      try {
        // キャッシュ回避のため t= を付与
        const res = await fetch(DATA_URL + '?t=' + Date.now());
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        const todos = Array.isArray(data.todos) ? data.todos : [];
        renderTodos(todos);
        setStatus('ok', '最終更新: ' + new Date().toLocaleTimeString('ja-JP'));
      } catch (e) {
        setStatus('error', 'エラー: ' + e.message);
        list.innerHTML = `<div class="error-box">データの取得に失敗しました: ${escHtml(e.message)}</div>`;
        stats.hidden = true;
      }
    }

    fetchAndRender();
    setInterval(fetchAndRender, INTERVAL);
  </script>
</body>
</html>
