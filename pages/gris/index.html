<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>gris</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #0a0a0f;
      overflow: hidden;
      font-family: 'Georgia', serif;
    }

    canvas { display: block; }

    #overlay {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    #name {
      font-size: clamp(4rem, 12vw, 9rem);
      font-weight: 300;
      letter-spacing: 0.3em;
      color: transparent;
      background: linear-gradient(135deg, #c8c8d8 0%, #8888aa 40%, #e0e0f0 70%, #a0a0c0 100%);
      -webkit-background-clip: text;
      background-clip: text;
      opacity: 0;
      transform: translateY(12px);
      animation: fadeUp 1.8s cubic-bezier(0.16, 1, 0.3, 1) 0.4s forwards;
    }

    #tagline {
      margin-top: 1rem;
      font-size: clamp(0.75rem, 2vw, 1rem);
      letter-spacing: 0.5em;
      text-transform: uppercase;
      color: #606080;
      opacity: 0;
      animation: fadeUp 1.8s cubic-bezier(0.16, 1, 0.3, 1) 0.9s forwards;
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div id="overlay">
    <div id="name">gris</div>
    <div id="tagline">&#x1F43E;&nbsp;&nbsp;gray &middot; gris &middot; グリ&nbsp;&nbsp;&#x1F43E;</div>
  </div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.165.0/build/three.module.js"
      }
    }
  </script>

  <script type="module">
    import * as THREE from 'three';

    // --- シーン基本設定 ---
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 1000);
    camera.position.z = 80;

    const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.setSize(innerWidth, innerHeight);
    renderer.setClearColor(0x0a0a0f, 1);
    document.body.prepend(renderer.domElement);

    // --- パーティクル ---
    const COUNT = 1800;
    const positions = new Float32Array(COUNT * 3);
    const colors    = new Float32Array(COUNT * 3);
    const sizes     = new Float32Array(COUNT);
    const phases    = new Float32Array(COUNT);

    const palette = [
      new THREE.Color(0xb0b0cc),
      new THREE.Color(0x8888bb),
      new THREE.Color(0xd8d8ee),
      new THREE.Color(0x606080),
      new THREE.Color(0xe8e4ff),
    ];

    for (let i = 0; i < COUNT; i++) {
      const r = 30 + Math.random() * 55;
      const theta = Math.random() * Math.PI * 2;
      const phi   = Math.acos(2 * Math.random() - 1);

      positions[i * 3]     = r * Math.sin(phi) * Math.cos(theta);
      positions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
      positions[i * 3 + 2] = r * Math.cos(phi);

      const c = palette[Math.floor(Math.random() * palette.length)];
      colors[i * 3]     = c.r;
      colors[i * 3 + 1] = c.g;
      colors[i * 3 + 2] = c.b;

      sizes[i]  = 0.4 + Math.random() * 1.2;
      phases[i] = Math.random() * Math.PI * 2;
    }

    const geometry = new THREE.BufferGeometry();
    geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geometry.setAttribute('color',    new THREE.BufferAttribute(colors, 3));
    geometry.setAttribute('size',     new THREE.BufferAttribute(sizes, 1));

    const material = new THREE.PointsMaterial({
      size: 0.8,
      vertexColors: true,
      transparent: true,
      opacity: 0.85,
      sizeAttenuation: true,
      depthWrite: false,
    });

    const particles = new THREE.Points(geometry, material);
    scene.add(particles);

    // --- マウスで視差 ---
    const mouse = { x: 0, y: 0 };
    window.addEventListener('mousemove', e => {
      mouse.x = (e.clientX / innerWidth  - 0.5) * 2;
      mouse.y = (e.clientY / innerHeight - 0.5) * 2;
    });

    // --- リサイズ ---
    window.addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });

    // --- アニメーション ---
    const clock = new THREE.Clock();

    (function animate() {
      requestAnimationFrame(animate);
      const t = clock.getElapsedTime();

      particles.rotation.y = t * 0.04 + mouse.x * 0.15;
      particles.rotation.x = mouse.y * 0.08;

      // 個々のパーティクルをゆらゆらさせる
      const pos = geometry.attributes.position;
      for (let i = 0; i < COUNT; i++) {
        const ix = i * 3;
        pos.array[ix + 1] += Math.sin(t * 0.6 + phases[i]) * 0.012;
      }
      pos.needsUpdate = true;

      renderer.render(scene, camera);
    })();
  </script>
</body>
</html>
