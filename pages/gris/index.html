<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>gris</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #ffffff;
      color: #374151;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Helvetica Neue', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    main {
      flex: 1;
      width: 100%;
      max-width: 640px;
      margin: 0 auto;
      padding: 4rem 1.5rem 2rem;
    }

    header { margin-bottom: 3rem; }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      color: #111827;
    }

    .subtitle {
      margin-top: 0.25rem;
      font-size: 0.875rem;
      color: #9ca3af;
    }

    .breadcrumb {
      margin-top: 0.5rem;
      font-size: 0.8125rem;
      color: #d1d5db;
    }

    .breadcrumb a {
      color: #9ca3af;
      text-decoration: none;
    }

    .breadcrumb a:hover { color: #6b7280; }

    .section-label {
      font-size: 0.75rem;
      font-weight: 500;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #9ca3af;
      margin-bottom: 0.75rem;
    }

    .card-list {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }

    a.card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.875rem 1rem;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      text-decoration: none;
      color: #374151;
      background: #ffffff;
      transition: background 0.15s, border-color 0.15s;
    }

    a.card:hover {
      background: #f9fafb;
      border-color: #d1d5db;
    }

    .card-name {
      font-size: 0.9375rem;
      font-weight: 500;
      color: #111827;
    }

    .card-arrow {
      color: #d1d5db;
      font-size: 0.875rem;
    }

    .state-text {
      font-size: 0.875rem;
      color: #9ca3af;
      padding: 0.5rem 0;
    }

    footer {
      padding: 2rem 1.5rem;
      text-align: center;
      font-size: 0.8125rem;
      color: #d1d5db;
    }

    footer a {
      color: #9ca3af;
      text-decoration: none;
    }

    footer a:hover { color: #6b7280; }
  </style>
</head>
<body>
  <main>
    <header>
      <h1>gris</h1>
      <p class="subtitle">🐾 gray &middot; gris &middot; グリ</p>
      <p class="breadcrumb"><a href="../../">cli_lab</a> / gris</p>
    </header>

    <p class="section-label">Pages</p>
    <div class="card-list" id="card-list">
      <p class="state-text" id="status">Loading…</p>
    </div>
  </main>

  <footer>
    <a href="https://github.com/p10-con/cli_lab" target="_blank" rel="noopener">github.com/p10-con/cli_lab</a>
  </footer>

  <script>
    const REPO = 'p10-con/cli_lab';
    const API  = `https://api.github.com/repos/${REPO}/contents/pages/gris`;

    async function load() {
      const list   = document.getElementById('card-list');
      const status = document.getElementById('status');

      try {
        const res = await fetch(API, { headers: { Accept: 'application/vnd.github+json' } });

        if (res.status === 403) {
          status.textContent = 'GitHub API rate limit exceeded. Try again later.';
          return;
        }
        if (!res.ok) throw new Error(`HTTP ${res.status}`);

        const entries = await res.json();
        const dirs = entries.filter(e => e.type === 'dir');

        if (dirs.length === 0) {
          status.textContent = 'No pages yet.';
          return;
        }

        status.remove();

        for (const dir of dirs) {
          const a = document.createElement('a');
          a.className = 'card';
          a.href = `${dir.name}/`;
          a.innerHTML = `
            <span class="card-name">${dir.name}</span>
            <span class="card-arrow">→</span>
          `;
          list.appendChild(a);
        }
      } catch (err) {
        status.textContent = 'Failed to load pages.';
        console.error(err);
      }
    }

    load();
  </script>
</body>
</html>
